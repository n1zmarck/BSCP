<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federated Messenger Pro</title>
    <!-- Markdown Library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

    <style>
        :root {
            --bg-dark: #121212; --bg-sidebar: #1e1e1e; --bg-header: #242424;
            --text-dim: #b0b0b0; --border: #333333; --msg-me: #0a84ff; --msg-them: #333333;
        }

        body { 
            margin: 0; font-family: -apple-system, sans-serif;
            background: var(--bg-dark); color: var(--text-main); 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        #sidebar { width: 300px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .user-profile { padding: 20px; background: var(--bg-header); border-bottom: 1px solid var(--border); font-weight: bold; color: var(--accent); font-size: 0.8em; }
        .new-chat-btn { margin: 15px; padding: 10px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #chat-list { flex: 1; overflow-y: auto; }
        .sidebar-item { padding: 15px 20px; border-bottom: 1px solid #252525; cursor: pointer; transition: 0.2s; }
        .sidebar-item.active { background: var(--bg-header); border-left: 4px solid var(--accent); }

        /* Main Chat */
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 15px 25px; background: var(--bg-header); border-bottom: 1px solid var(--border); font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        /* Bubbles & Markdown */
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 15px; font-size: 0.95em; line-height: 1.5; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--msg-me); border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: var(--msg-them); border-bottom-left-radius: 2px; }
        .msg small { display: block; font-size: 0.7em; margin-bottom: 5px; opacity: 0.7; }
        
        /* Markdown Content Styling */
        .msg p { margin: 5px 0; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 8px; display: block; background: #000; }
        .msg code { background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; font-family: monospace; }

        /* Input */
        #input-area { padding: 20px; background: var(--bg-sidebar); border-top: 1px solid var(--border); }
        .input-row { display: flex; gap: 10px; align-items: center; }
        input { background: #2a2a2a; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; outline: none; }
        #msg-input { flex: 1; }
        .icon-btn { background: #444; border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 1.2em; }
        .send-btn { background: var(--accent); border: none; color: white; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="user-profile">INGELOGD ALS: {{ user }}</div>
        <button class="new-chat-btn" onclick="uiStartNewChat()">+ Nieuw Gesprek</button>
        <div id="chat-list"></div>
    </div>

    <div id="chat-area">
        <div id="chat-header">Selecteer een gesprek</div>
        <div id="messages"></div>

        <div id="input-area">
            <input id="new-chat-user" placeholder="Ontvanger ID (user@host:5001)" style="display:none; width: 100%; margin-bottom: 10px; box-sizing: border-box;">
            <div class="input-row">
                <input type="file" id="file-input" style="display:none;" onchange="handleFileUpload()">
                <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Afbeelding uploaden">📷</button>
                <input id="msg-input" placeholder="Typ een bericht (Markdown ondersteund)..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">Verzend</button>
            </div>
        </div>
    </div>

    <script>
        let currentChat = null;
        let lastMsgCount = 0;

        // Configureer Markdown
        marked.setOptions({ gfm: true, breaks: true, headerIds: false, mangle: false });

        function uiStartNewChat() {
            currentChat = null;
            lastMsgCount = 0;
            document.getElementById('chat-header').innerText = "Nieuw Gesprek";
            document.getElementById('messages').innerHTML = '<div style="text-align:center; color:var(--text-dim); margin-top:50px;">Voer een ID in en gebruik Markdown of afbeeldingen.</div>';
            const ncu = document.getElementById('new-chat-user');
            ncu.style.display = 'block'; ncu.value = ''; ncu.focus();
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        }

        async function loadChats() {
            const res = await fetch('/api/chats');
            const chats = await res.json();
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `sidebar-item ${currentChat === chat ? 'active' : ''}`;
                div.innerHTML = `<strong>${chat}</strong>`;
                div.onclick = () => selectChat(chat);
                list.appendChild(div);
            });
        }

        function selectChat(chat) {
            currentChat = chat;
            lastMsgCount = 0; 
            document.getElementById('chat-header').innerText = chat;
            document.getElementById('new-chat-user').style.display = 'none';
            loadMessages();
            loadChats();
        }

        async function loadMessages() {
            if (!currentChat) return;

            if (typeof marked === 'undefined') {
        console.error("Marked library nog niet geladen...");
        return; 
    }

            const res = await fetch(`/api/messages/${encodeURIComponent(currentChat)}`);
            const msgs = await res.json();
            
            if (msgs.length !== lastMsgCount) {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                
                msgs.forEach(m => {
                    const isMe = m.sender === '{{ user }}';
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'me' : 'them'}`;
                    
                    // Render Markdown
                    let htmlContent = marked.parse(m.text);

                    // Proxy afbeeldingen om IP-leaks te voorkomen
                    const temp = document.createElement('div');
                    temp.innerHTML = htmlContent;
                    temp.querySelectorAll('img').forEach(img => {
                        const original = img.src;
                        // Alleen proxien als het een externe URL is
                        if(!original.includes(window.location.host + '/uploads/')) {
                            img.src = `/media/proxy?url=${encodeURIComponent(original)}`;
                        }
                        img.loading = "lazy";
                    });

                    div.innerHTML = `<small>${m.sender.split('@')[0]}</small>${temp.innerHTML}`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
                lastMsgCount = msgs.length;
            }
        }

        async function handleFileUpload() {
            const fileInput = document.getElementById('file-input');
            if (fileInput.files.length === 0) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('msg-input').value += ` ${data.markdown} `;
            } else {
                alert("Upload mislukt.");
            }
            fileInput.value = ''; // Reset input
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            const receiver = currentChat || document.getElementById('new-chat-user').value.trim();

            if (!text || !receiver) return;

            const res = await fetch('/api/sendmessage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({receiver, messageText: text})
            });

            if (res.ok) {
                input.value = '';
                if (!currentChat) selectChat(receiver);
                else loadMessages();
            } else {
                alert("Verzenden mislukt. Is de andere node bereikbaar?");
            }
        }

        function initApp() {
    // Check elke 100ms of marked al gedefinieerd is
    if (typeof marked !== 'undefined') {
        console.log("Marked geladen, app start...");
        
        // Configureer marked één keer
        marked.setOptions({ gfm: true, breaks: true });

        // Start de polling loops
        setInterval(() => { 
            loadChats(); 
            if (currentChat) loadMessages(); 
        }, 2000);

        loadChats();
    } else {
        console.log("Wachten op marked library...");
        setTimeout(initApp, 100); // Probeer het over 100ms opnieuw
    }
}

// Start het initialisatieproces
initApp();
    </script>
</body>
</html>
